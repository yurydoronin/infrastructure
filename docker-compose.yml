services:

  kafka:
    image: apache/kafka:4.3.0
    restart: on-failure
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9999:9999"
    environment:
      # ===== KRaft =====
      KAFKA_NODE_ID: 1 # аналог KAFKA_BROKER_ID
      KAFKA_PROCESS_ROLES: broker,controller # один процесс выполняет обе роли
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # controller quorum вместо ZooKeeper
      # ===== Listeners =====
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # ===== Single Node =====
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false" # чтобы не создавать случайные топики

      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: ${DOCKER_HOST_IP:-127.0.0.1}

      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:19092"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  init-kafka:
    image: apache/kafka:4.3.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c '

      echo "Creating kafka topics"

      /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server kafka:19092 \
        --create \
        --if-not-exists \
        --topic stock.events \
        --partitions 1 \
        --replication-factor 1

      /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server kafka:19092 \
        --create \
        --if-not-exists \
        --topic basket.events \
        --partitions 1 \
        --replication-factor 1

      /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server kafka:19092 \
        --create \
        --if-not-exists \
        --topic order.events \
        --partitions 1 \
        --replication-factor 1

      /opt/kafka/bin/kafka-topics.sh \
        --bootstrap-server kafka:19092 \
        --list
      '

  debezium:
    image: debezium/connect:2.7.3.Final
    restart: on-failure
    container_name: debezium
    ports:
      - "8085:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:19092
      GROUP_ID: "debezium"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      CONNECTORS_DIR: /kafka/connectors
    volumes:
      - ./connectors:/kafka/connectors
    depends_on:
      - kafka
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8083/connectors"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  connect-init:
    image: curlimages/curl:8.5.0
    restart: no
    entrypoint: >
      /bin/sh -c '
        until curl -sS -f http://debezium:8083/connectors; do
          echo "Waiting for Kafka Connect to be ready..."
          sleep 5
        done
        echo "Kafka Connect is ready!"
        curl -X POST -H "Content-Type: application/json" --data @/data/outbox-connector.json http://debezium:8083/connectors/
        echo "Debezium connector registered!"
      '
    volumes:
      - ./connectors/outbox-connector.json:/data/outbox-connector.json:ro
    depends_on:
      debezium:
        condition: service_healthy

  kowl:
    image: quay.io/cloudhut/kowl:v1.4.0
    restart: on-failure
    volumes:
      - ./kowl_config:/etc/kowl:Z
    ports:
      - "8087:8080"
    entrypoint: ./kowl --config.filepath=/etc/kowl/config.yaml
    depends_on:
      - init-kafka

  backoffice:
    image: registry.gitlab.com/microarch-ru/ddd-in-practice/front-end/backoffice:latest
    restart: on-failure
    ports:
      - "8086:8080"